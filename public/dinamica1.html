<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinamica 1: Dime quien eres...</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #fcfdfe;
            --text: #0f172a;
            --slate-400: #94a3b8;
            --slate-100: #f1f5f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: transparent;
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            z-index: 10;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--slate-400);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .container {
            width: 95%;
            height: 80%;
            background: white;
            border-radius: 2rem;
            border: 1px solid var(--slate-100);
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .word-cloud {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .word {
            position: absolute;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--slate-400);
            white-space: nowrap;
            cursor: default;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            padding: 0.5rem 1rem;
            border-radius: 1rem;
        }

        .word.selected {
            color: white;
            background-color: var(--primary);
            font-size: 1.8rem;
            font-weight: 900;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.4);
            transform: translate(-50%, -50%) !important;
        }

        .word.dimmed {
            opacity: 0.1;
            filter: blur(2px);
            transform: scale(0.8);
        }

        .controls {
            margin-top: 2rem;
            z-index: 10;
        }

        button {
            background-color: var(--text);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 0.875rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        button:hover {
            background-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translate(0, 0); }
            25% { transform: translate(10px, -10px); }
            50% { transform: translate(-5px, 15px); }
            75% { transform: translate(-15px, -5px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="word-cloud" id="wordCloud"></div>
    </div>

    <div class="controls">
        <button id="raffleBtn">Sortear palabras</button>
    </div>

    <script>
        const words = [
            "Cliente", "Negocio", "Soja", "Cosecha", "Siembra", "Maíz", "Trigo", "Campo", "Argentina", "Rosario", "Región", "Campo argentino", "Economía", "Inflación", "Dólar", "Trabajo", "Esfuerzo", "Crecimiento", "Crisis", "Futuro", "Historia", "Presente", "Camino", "Decisión", "Riesgo", "Mate", "Café", "Mesa", "Charla", "Amigo", "Familia", "Viaje", "Casa", "Tiempo", "Energía", "Constancia", "Paciencia", "Presión", "Frustración", "Etapa", "Desafío", "Aprendizaje", "Mejora", "Diferencia", "Impulso", "Construcción", "Progreso", "Equipo", "Messi", "Maradona", "Partido", "Mundial", "Rugby", "Fútbol", "Pádel", "Mercado", "Oportunidad", "Inversión", "Rentabilidad", "Planificación", "Innovación", "Estrategia", "Resultado", "Producción", "Rendimiento", "Clima", "Lluvia", "Sequía", "Tierra", "Cultivo", "Campaña", "Motivación", "Disciplina", "Resiliencia", "Enfoque"
        ];

        const wordCloud = document.getElementById('wordCloud');
        const raffleBtn = document.getElementById('raffleBtn');
        const container = document.getElementById('container');
        
        let wordElements = [];
        let isRaffled = false;

        // Initialize words
        function init() {
            wordCloud.innerHTML = '';
            wordElements = [];
            
            words.forEach((word, index) => {
                const el = document.createElement('div');
                el.className = 'word';
                el.textContent = word;
                
                // Random position
                const x = Math.random() * 80 + 10;
                const y = Math.random() * 80 + 10;
                el.style.left = `${x}%`;
                el.style.top = `${y}%`;
                
                // Random animation delay and duration
                const duration = 10 + Math.random() * 10;
                const delay = Math.random() * -20;
                el.style.animation = `float ${duration}s ease-in-out ${delay}s infinite`;
                
                wordCloud.appendChild(el);
                wordElements.push({
                    el,
                    initialX: x,
                    initialY: y
                });
            });
        }

        function raffle() {
            if (isRaffled) {
                // Reset
                wordElements.forEach(item => {
                    item.el.className = 'word';
                    item.el.style.left = `${item.initialX}%`;
                    item.el.style.top = `${item.initialY}%`;
                    item.el.style.animationPlayState = 'running';
                });
                isRaffled = false;
                // Small delay before next raffle to show reset
                setTimeout(performRaffle, 300);
            } else {
                performRaffle();
            }
        }

        function performRaffle() {
            // Select 5 random indices
            const selectedIndices = [];
            while (selectedIndices.length < 5) {
                const r = Math.floor(Math.random() * wordElements.length);
                if (!selectedIndices.includes(r)) {
                    selectedIndices.push(r);
                }
            }

            // Positions for the 5 selected words (centered)
            const positions = [
                { x: 50, y: 30 },
                { x: 30, y: 50 },
                { x: 70, y: 50 },
                { x: 40, y: 70 },
                { x: 60, y: 70 }
            ];

            wordElements.forEach((item, index) => {
                item.el.style.animationPlayState = 'paused';
                
                if (selectedIndices.includes(index)) {
                    const posIndex = selectedIndices.indexOf(index);
                    item.el.className = 'word selected';
                    item.el.style.left = `${positions[posIndex].x}%`;
                    item.el.style.top = `${positions[posIndex].y}%`;
                } else {
                    item.el.className = 'word dimmed';
                }
            });

            isRaffled = true;
        }

        raffleBtn.addEventListener('click', raffle);

        // Initialize on load
        init();
    </script>
</body>
</html>
